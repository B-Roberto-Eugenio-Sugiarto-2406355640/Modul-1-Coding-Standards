<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>

<div class="container my-2">
    <h2>Product List</h2>
    <a th:href="@{/product/create}" class="btn btn-primary btn-sm mb-3">Create Product</a>

    <table border="1" class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th scope="col">Product Name</th>
            <th scope="col">Quantity</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product: ${products}">
            <td th:text="${product.productName}"></td>
            <td>
                <div class="d-flex justify-content-between align-items-center">
                    <span th:text="${product.productQuantity}"></span>
                    <div class="d-flex align-items-center">
                        <a th:href="@{/product/edit/{id}(id=${product.productId})}" class="btn btn-outline-primary btn-sm" title="Edit" aria-label="Edit product">
                            <span aria-hidden="true">&#9998;</span>
                            <span class="sr-only">Edit</span>
                        </a>
                        <a th:href="@{/product/delete/{id}(id=${product.productId})}" class="btn btn-outline-danger btn-sm ml-2" title="Delete" aria-label="Delete product">
                            <span aria-hidden="true">&times;</span>
                            <span class="sr-only">Delete</span>
                        </a>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delete Product</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h3>Delete Product Confirmation</h3>
    <p>Are you sure you want to delete this product?</p>

    <ul class="list-group mb-3 col-md-6 p-0">
        <li class="list-group-item">
            <strong>Name:</strong> <span th:text="${product.productName}"></span>
        </li>
        <li class="list-group-item">
            <strong>Quantity:</strong> <span th:text="${product.productQuantity}"></span>
        </li>
    </ul>

    <form th:action="@{/product/delete}" method="post" class="d-inline">
        <input type="hidden" name="productId" th:value="${product.productId}">
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
    </form>
    <a th:href="@{/product/list}" class="btn btn-secondary">Cancel</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
